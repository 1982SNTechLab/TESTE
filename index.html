<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Tech Lab - Em Breve</title>
    <style>
        /* Cores extraídas do seu logo */
        :root {
            --azul-escuro: #1b4292; /* Azul SN */
            --azul-claro: #00acee;  /* Ciano SN */
            --branco-gelo: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Degradê usando as cores da marca */
            background: linear-gradient(135deg, #0f172a 0%, #1b4292 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        .logo-img {
            max-width: 250px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            color: var(--azul-claro);
        }

        p.subtitle {
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* Botões */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-email {
            background-color: var(--azul-claro);
            color: #0f172a;
        }

        .btn-email:hover {
            background-color: #7dd3fc;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 172, 238, 0.3);
        }

        .btn-phone {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid var(--azul-claro);
        }

        .btn-phone:hover {
            background-color: rgba(0, 172, 238, 0.1);
            transform: translateY(-3px);
        }

        span.icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="SN Tech Lab Logo" class="logo-img">
        
        <h1>MAIS INFORMAÇÕES EM BREVE</h1>
        <p class="subtitle">Estamos preparando um novo ambiente tecnológico para você.</p>
        
        <div class="btn-group">
            <a href="mailto:sergiotechlab@gmail.com" class="btn btn-email">
                <span class="icon">✉️</span> Enviar E-mail
            </a>

            <a href="tel:+5531988082406" class="btn btn-phone">
                <span class="icon">📞</span> Chamar no Telefone
            </a>
        </div>

        <footer>
            &copy; 2026 SN TECH LAB. Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
