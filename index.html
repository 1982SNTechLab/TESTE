<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Tech Lab - Em Breve</title>
    <style>
        /* Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            color: #38bdf8; /* Azul Tech */
        }

        p.subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        /* Estilo dos Botões */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-email {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .btn-email:hover {
            background-color: #7dd3fc;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-phone {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #38bdf8;
        }

        .btn-phone:hover {
            background-color: rgba(56, 189, 248, 0.1);
            transform: translateY(-3px);
        }

        span.icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MAIS INFORMAÇÕES EM BREVE</h1>
        <p class="subtitle">Estamos preparando algo incrível para a <strong>SN Tech Lab</strong>.</p>
        
        <div class="btn-group">
            <a href="mailto:sergio.nascimento@sntechlab.com.br" class="btn btn-email">
                <span class="icon">✉️</span> Enviar E-mail
            </a>

            <a href="tel:+5531988082406" class="btn btn-phone">
                <span class="icon">📞</span> Chamar no Telefone
            </a>
        </div>

        <footer>
            &copy; 2024 SN Tech Lab. Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
